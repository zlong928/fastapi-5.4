services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fastapi_user
      POSTGRES_PASSWORD: fastapi_pass
      POSTGRES_DB: fastapi_app
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fastapi_user -d fastapi_app"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    restart: unless-stopped
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python3", "-m", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    environment:
      DATA_DIR: /app/data
      LOG_DIR: /app/logs
      TZ: Asia/Shanghai
      REDIS_URL: redis://redis:6379/0
      DOCUMENT_QUEUE_NAME: ${DOCUMENT_QUEUE_NAME:-pdf_task_queue}
      EXTRACTION_QUEUE_NAME: ${EXTRACTION_QUEUE_NAME:-extraction_task_queue}
      DATABASE_URL: postgresql://fastapi_user:fastapi_pass@postgres:5432/fastapi_app
      ENABLE_BACKGROUND_WORKER: "False"
      TESSERACT_CMD: ${TESSERACT_CMD:-tesseract}
      OCR_TICK_MIN_CONFIDENCE: ${OCR_TICK_MIN_CONFIDENCE:-45}
      ENABLE_MINERU_PARSER: ${ENABLE_MINERU_PARSER:-True}
      MINERU_API_KEY: ${MINERU_API_KEY:-}
      MINERU_API_BASE_URL: ${MINERU_API_BASE_URL:-https://mineru.net}
      MINERU_MODEL_VERSION: ${MINERU_MODEL_VERSION:-vlm}
      MINERU_LANGUAGE: ${MINERU_LANGUAGE:-en}
      MINERU_POLL_INTERVAL_SECONDS: ${MINERU_POLL_INTERVAL_SECONDS:-5}
      MINERU_TIMEOUT_SECONDS: ${MINERU_TIMEOUT_SECONDS:-1800}
      MINERU_SUBMIT_RATE_LIMIT_PER_MINUTE: ${MINERU_SUBMIT_RATE_LIMIT_PER_MINUTE:-50}
      MINERU_RESULT_RATE_LIMIT_PER_MINUTE: ${MINERU_RESULT_RATE_LIMIT_PER_MINUTE:-1000}
      JWT_SECRET_KEY: change-me
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "1440"
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      CORS_ALLOWED_ORIGIN_REGEX: ${CORS_ALLOWED_ORIGIN_REGEX:-https://.*\.vercel\.app}
      OAUTH_ALLOWED_FRONTEND_ORIGINS: ${OAUTH_ALLOWED_FRONTEND_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000,https://fastapi-5-4.vercel.app}
      SESSION_SECRET_KEY: change-me
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-hash}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-nomic-embed-text}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://muyuan.do}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-claude-opus-4-6}
      LLM_LORA_ID: ${LLM_LORA_ID:-}
      VLM_BASE_URL: ${VLM_BASE_URL:-}
      VLM_API_KEY: ${VLM_API_KEY:-}
      VLM_MODEL: ${VLM_MODEL:-}
      VLM_LORA_ID: ${VLM_LORA_ID:-}
      VLM_FALLBACK_MODELS: ${VLM_FALLBACK_MODELS:-}
      VLM_API_FORMAT: ${VLM_API_FORMAT:-openai_chat}
      VLM_ALLOW_NON_STREAM_FALLBACK: ${VLM_ALLOW_NON_STREAM_FALLBACK:-}
      VLM_ALLOW_ROOT_CHAT_FALLBACK: ${VLM_ALLOW_ROOT_CHAT_FALLBACK:-}
      LLM_FALLBACK_MODELS: ${LLM_FALLBACK_MODELS:-}
      LLM_API_FORMAT: ${LLM_API_FORMAT:-openai_chat}
      LLM_ALLOW_NON_STREAM_FALLBACK: ${LLM_ALLOW_NON_STREAM_FALLBACK:-}
      FALLBACK_MIMO_BASE_URL: ${FALLBACK_MIMO_BASE_URL:-}
      FALLBACK_MIMO_API_KEY: ${FALLBACK_MIMO_API_KEY:-}
      FALLBACK_MIMO_MODEL: ${FALLBACK_MIMO_MODEL:-}
      VISUAL_LLM_MAX_WORKERS: ${VISUAL_LLM_MAX_WORKERS:-4}
      VISUAL_LLM_MAX_RETRIES: ${VISUAL_LLM_MAX_RETRIES:-1}
      LLM_MAX_CONCURRENCY: ${LLM_MAX_CONCURRENCY:-4}
      LLM_HTTP_RETRIES: ${LLM_HTTP_RETRIES:-2}
      LLM_RETRY_BACKOFF_SECONDS: ${LLM_RETRY_BACKOFF_SECONDS:-1.5}
      LLM_MIN_REQUEST_INTERVAL_SECONDS: ${LLM_MIN_REQUEST_INTERVAL_SECONDS:-1.0}
      LLM_ALLOW_ROOT_CHAT_FALLBACK: ${LLM_ALLOW_ROOT_CHAT_FALLBACK:-False}
      LLM_IMAGE_MAX_BYTES: ${LLM_IMAGE_MAX_BYTES:-1500000}
      LLM_IMAGE_MAX_SIDE: ${LLM_IMAGE_MAX_SIDE:-1000}
      LLM_IMAGE_JPEG_QUALITY: ${LLM_IMAGE_JPEG_QUALITY:-75}
      LLM_IMAGE_FORCE_JPEG: ${LLM_IMAGE_FORCE_JPEG:-True}
      BATCH_EXTRACTION_QUEUE_NAME: ${BATCH_EXTRACTION_QUEUE_NAME:-batch_extraction_queue}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      WEB_SEARCH_ENABLED: ${WEB_SEARCH_ENABLED:-True}
      WEB_SEARCH_MAX_RESULTS: ${WEB_SEARCH_MAX_RESULTS:-5}
    volumes:
      - .:/app
      - ./data:/app/data
      - ./logs:/app/logs
      - ./data/uploads:/app/data/uploads
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python3", "-u", "-m", "app.worker"]
    environment:
      DATA_DIR: /app/data
      LOG_DIR: /app/logs
      TZ: Asia/Shanghai
      REDIS_URL: redis://redis:6379/0
      DOCUMENT_QUEUE_NAME: ${DOCUMENT_QUEUE_NAME:-pdf_task_queue}
      EXTRACTION_QUEUE_NAME: ${EXTRACTION_QUEUE_NAME:-extraction_task_queue}
      DATABASE_URL: postgresql://fastapi_user:fastapi_pass@postgres:5432/fastapi_app
      ENABLE_BACKGROUND_WORKER: "False"
      TESSERACT_CMD: ${TESSERACT_CMD:-tesseract}
      OCR_TICK_MIN_CONFIDENCE: ${OCR_TICK_MIN_CONFIDENCE:-45}
      ENABLE_MINERU_PARSER: ${ENABLE_MINERU_PARSER:-True}
      MINERU_API_KEY: ${MINERU_API_KEY:-}
      MINERU_API_BASE_URL: ${MINERU_API_BASE_URL:-https://mineru.net}
      MINERU_MODEL_VERSION: ${MINERU_MODEL_VERSION:-vlm}
      MINERU_LANGUAGE: ${MINERU_LANGUAGE:-en}
      MINERU_POLL_INTERVAL_SECONDS: ${MINERU_POLL_INTERVAL_SECONDS:-5}
      MINERU_TIMEOUT_SECONDS: ${MINERU_TIMEOUT_SECONDS:-1800}
      MINERU_SUBMIT_RATE_LIMIT_PER_MINUTE: ${MINERU_SUBMIT_RATE_LIMIT_PER_MINUTE:-50}
      MINERU_RESULT_RATE_LIMIT_PER_MINUTE: ${MINERU_RESULT_RATE_LIMIT_PER_MINUTE:-1000}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-hash}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-nomic-embed-text}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://muyuan.do}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-claude-opus-4-6}
      LLM_LORA_ID: ${LLM_LORA_ID:-}
      VLM_BASE_URL: ${VLM_BASE_URL:-}
      VLM_API_KEY: ${VLM_API_KEY:-}
      VLM_MODEL: ${VLM_MODEL:-}
      VLM_LORA_ID: ${VLM_LORA_ID:-}
      VLM_FALLBACK_MODELS: ${VLM_FALLBACK_MODELS:-}
      VLM_API_FORMAT: ${VLM_API_FORMAT:-openai_chat}
      VLM_ALLOW_NON_STREAM_FALLBACK: ${VLM_ALLOW_NON_STREAM_FALLBACK:-}
      VLM_ALLOW_ROOT_CHAT_FALLBACK: ${VLM_ALLOW_ROOT_CHAT_FALLBACK:-}
      LLM_FALLBACK_MODELS: ${LLM_FALLBACK_MODELS:-}
      LLM_API_FORMAT: ${LLM_API_FORMAT:-openai_chat}
      LLM_ALLOW_NON_STREAM_FALLBACK: ${LLM_ALLOW_NON_STREAM_FALLBACK:-}
      FALLBACK_MIMO_BASE_URL: ${FALLBACK_MIMO_BASE_URL:-}
      FALLBACK_MIMO_API_KEY: ${FALLBACK_MIMO_API_KEY:-}
      FALLBACK_MIMO_MODEL: ${FALLBACK_MIMO_MODEL:-}
      VISUAL_LLM_MAX_WORKERS: ${VISUAL_LLM_MAX_WORKERS:-4}
      VISUAL_LLM_MAX_RETRIES: ${VISUAL_LLM_MAX_RETRIES:-1}
      LLM_MAX_CONCURRENCY: ${LLM_MAX_CONCURRENCY:-4}
      LLM_HTTP_RETRIES: ${LLM_HTTP_RETRIES:-2}
      LLM_RETRY_BACKOFF_SECONDS: ${LLM_RETRY_BACKOFF_SECONDS:-1.5}
      LLM_MIN_REQUEST_INTERVAL_SECONDS: ${LLM_MIN_REQUEST_INTERVAL_SECONDS:-1.0}
      LLM_ALLOW_ROOT_CHAT_FALLBACK: ${LLM_ALLOW_ROOT_CHAT_FALLBACK:-False}
      LLM_IMAGE_MAX_BYTES: ${LLM_IMAGE_MAX_BYTES:-1500000}
      LLM_IMAGE_MAX_SIDE: ${LLM_IMAGE_MAX_SIDE:-1000}
      LLM_IMAGE_JPEG_QUALITY: ${LLM_IMAGE_JPEG_QUALITY:-75}
      LLM_IMAGE_FORCE_JPEG: ${LLM_IMAGE_FORCE_JPEG:-True}
    volumes:
      - .:/app
      - ./data:/app/data
      - ./logs:/app/logs
      - ./data/uploads:/app/data/uploads
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  extraction-worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python3", "-u", "-m", "app.extraction_worker"]
    environment:
      DATA_DIR: /app/data
      LOG_DIR: /app/logs
      TZ: Asia/Shanghai
      REDIS_URL: redis://redis:6379/0
      DOCUMENT_QUEUE_NAME: ${DOCUMENT_QUEUE_NAME:-pdf_task_queue}
      EXTRACTION_QUEUE_NAME: ${EXTRACTION_QUEUE_NAME:-extraction_task_queue}
      EXTRACTION_WORKER_CONCURRENCY: ${EXTRACTION_WORKER_CONCURRENCY:-2}
      DATABASE_URL: postgresql://fastapi_user:fastapi_pass@postgres:5432/fastapi_app
      ENABLE_BACKGROUND_WORKER: "False"
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://muyuan.do}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-claude-opus-4-6}
      LLM_LORA_ID: ${LLM_LORA_ID:-}
      VLM_BASE_URL: ${VLM_BASE_URL:-}
      VLM_API_KEY: ${VLM_API_KEY:-}
      VLM_MODEL: ${VLM_MODEL:-}
      VLM_LORA_ID: ${VLM_LORA_ID:-}
      VLM_FALLBACK_MODELS: ${VLM_FALLBACK_MODELS:-}
      VLM_API_FORMAT: ${VLM_API_FORMAT:-openai_chat}
      VLM_ALLOW_NON_STREAM_FALLBACK: ${VLM_ALLOW_NON_STREAM_FALLBACK:-}
      VLM_ALLOW_ROOT_CHAT_FALLBACK: ${VLM_ALLOW_ROOT_CHAT_FALLBACK:-}
      LLM_FALLBACK_MODELS: ${LLM_FALLBACK_MODELS:-}
      LLM_API_FORMAT: ${LLM_API_FORMAT:-openai_chat}
      LLM_ALLOW_NON_STREAM_FALLBACK: ${LLM_ALLOW_NON_STREAM_FALLBACK:-}
      FALLBACK_MIMO_BASE_URL: ${FALLBACK_MIMO_BASE_URL:-}
      FALLBACK_MIMO_API_KEY: ${FALLBACK_MIMO_API_KEY:-}
      FALLBACK_MIMO_MODEL: ${FALLBACK_MIMO_MODEL:-}
      VISUAL_LLM_MAX_WORKERS: ${VISUAL_LLM_MAX_WORKERS:-3}
      VISUAL_LLM_MAX_RETRIES: ${VISUAL_LLM_MAX_RETRIES:-1}
      LLM_MAX_CONCURRENCY: ${LLM_MAX_CONCURRENCY:-3}
      LLM_HTTP_RETRIES: ${LLM_HTTP_RETRIES:-2}
      LLM_RETRY_BACKOFF_SECONDS: ${LLM_RETRY_BACKOFF_SECONDS:-1.5}
      LLM_MIN_REQUEST_INTERVAL_SECONDS: ${LLM_MIN_REQUEST_INTERVAL_SECONDS:-1.0}
      LLM_ALLOW_ROOT_CHAT_FALLBACK: ${LLM_ALLOW_ROOT_CHAT_FALLBACK:-False}
      LLM_IMAGE_MAX_BYTES: ${LLM_IMAGE_MAX_BYTES:-1500000}
      LLM_IMAGE_MAX_SIDE: ${LLM_IMAGE_MAX_SIDE:-1000}
      LLM_IMAGE_JPEG_QUALITY: ${LLM_IMAGE_JPEG_QUALITY:-75}
      LLM_IMAGE_FORCE_JPEG: ${LLM_IMAGE_FORCE_JPEG:-True}
    volumes:
      - .:/app
      - ./data:/app/data
      - ./logs:/app/logs
      - ./data/uploads:/app/data/uploads
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  batch-extraction-worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python3", "-u", "-m", "app.batch_extraction_worker"]
    environment:
      DATA_DIR: /app/data
      LOG_DIR: /app/logs
      TZ: Asia/Shanghai
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql://fastapi_user:fastapi_pass@postgres:5432/fastapi_app
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://muyuan.do}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-claude-opus-4-6}
      VLM_BASE_URL: ${VLM_BASE_URL:-}
      VLM_API_KEY: ${VLM_API_KEY:-}
      VLM_MODEL: ${VLM_MODEL:-}
      FALLBACK_MIMO_BASE_URL: ${FALLBACK_MIMO_BASE_URL:-}
      FALLBACK_MIMO_API_KEY: ${FALLBACK_MIMO_API_KEY:-}
      FALLBACK_MIMO_MODEL: ${FALLBACK_MIMO_MODEL:-}
      VISUAL_LLM_MAX_WORKERS: ${VISUAL_LLM_MAX_WORKERS:-2}
      LLM_MAX_CONCURRENCY: ${LLM_MAX_CONCURRENCY:-2}
      BATCH_EXTRACTION_QUEUE_NAME: ${BATCH_EXTRACTION_QUEUE_NAME:-batch_extraction_queue}
      BATCH_CONCURRENCY: ${BATCH_CONCURRENCY:-20}
      BATCH_PROGRESS_INTERVAL: ${BATCH_PROGRESS_INTERVAL:-5.0}
      BATCH_WORKER_MAX_JOBS: ${BATCH_WORKER_MAX_JOBS:-3}
      IMAGE_EXTRACT_TIMEOUT: ${IMAGE_EXTRACT_TIMEOUT:-300}
    volumes:
      - .:/app
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
      TZ: Asia/Shanghai
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  frontend_node_modules:
  pgdata:
